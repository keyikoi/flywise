<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航班预订助手 - AI Chat</title>

    <!-- React & ReactDOM -->
    <script crossorigin="" src="./航班预订助手 - AI Chat_files/react.development.js"></script>
    <script crossorigin="" src="./航班预订助手 - AI Chat_files/react-dom.development.js"></script>
    <script src="./航班预订助手 - AI Chat_files/babel.min.js"></script>

    <!-- Framer Motion -->
    <script src="./航班预订助手 - AI Chat_files/framer-motion.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="./航班预订助手 - AI Chat_files/css2" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 主题色 - Electric Purple */
            --electric-purple: #6666FF;
            --electric-purple-light: #8888FF;
            --electric-purple-dark: #5555EE;
            --electric-purple-rgb: 102, 102, 255;

            /* 紫色系 */
            --purple-50: rgba(102, 102, 255, 0.08);
            --purple-100: rgba(102, 102, 255, 0.15);
            --purple-200: rgba(102, 102, 255, 0.25);
            --purple-300: rgba(102, 102, 255, 0.4);
            --purple-400: rgba(102, 102, 255, 0.6);
            --purple-500: rgba(102, 102, 255, 0.8);

            /* 强调色 */
            --coral-pink: #FF6B6B;
            --mint-green: #4ECDC4;
            --sunset-orange: #FF8E53;

            /* 中性色 */
            --ink-black: #0a0a0f;
            --slate-gray: #6B7280;
            --mist-gray: #F3F4F6;
            --pure-white: #FFFFFF;

            /* 背景 */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-hover: rgba(102, 102, 255, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0d0d14 100%);
            color: var(--pure-white);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 微纹理 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 1000;
        }

        /* Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
        }

        .bg-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(102, 102, 255, 0.4) 0%, transparent 70%);
            top: -300px;
            right: -200px;
            animation: float 10s ease-in-out infinite;
        }

        .bg-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.3) 0%, transparent 70%);
            bottom: -250px;
            left: -200px;
            animation: float 12s ease-in-out reverse;
        }

        .bg-orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.25) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -40px) scale(1.05); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        /* App Container - Mobile First */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .chat-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-logo {
            font-size: 1.75rem;
            animation: plane-float 3s ease-in-out infinite;
        }

        @keyframes plane-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(2deg); }
        }

        .header-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-text p {
            font-size: 0.75rem;
            color: var(--slate-gray);
            margin-top: 0.125rem;
        }

        /* Chat Messages Container */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: message-slide-in 0.3s ease;
        }

        @keyframes message-slide-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            margin-left: auto;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 0.875rem 1rem;
            border-radius: 18px;
            font-size: 0.9375rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--electric-purple-dark) 100%);
            border-bottom-right-radius: 4px;
            color: var(--pure-white);
        }

        .message.assistant .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.6875rem;
            color: var(--slate-gray);
            margin-top: 0.375rem;
            padding: 0 0.25rem;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--slate-gray);
            border-radius: 50%;
            animation: typing-bounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing-bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Input Area */
        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0.875rem 1.25rem;
            color: var(--pure-white);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: all 0.25s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--electric-purple);
            background: var(--bg-card-hover);
            box-shadow: 0 0 0 4px rgba(102, 102, 255, 0.1);
        }

        .chat-input::placeholder {
            color: var(--slate-gray);
        }

        .send-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--electric-purple-dark) 100%);
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(102, 102, 255, 0.35);
        }

        .send-button:active {
            transform: scale(0.95);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem 1rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .quick-actions::-webkit-scrollbar {
            display: none;
        }

        .quick-action-chip {
            flex-shrink: 0;
            padding: 0.5rem 0.875rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.8125rem;
            color: var(--pure-white);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .quick-action-chip:hover {
            border-color: var(--electric-purple);
            background: var(--purple-50);
        }

        /* Flight Card in Chat */
        .flight-card-rich {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 0.75rem;
            transition: all 0.3s ease;
        }

        .flight-card-rich:hover {
            border-color: var(--border-color-hover);
            background: var(--bg-card-hover);
        }

        .flight-card-header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .flight-route {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .route-code {
            font-family: 'Manrope', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .route-arrow {
            color: var(--slate-gray);
            font-size: 0.875rem;
        }

        .flight-price {
            font-family: 'Manrope', sans-serif;
            font-size: 1.375rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--mint-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .flight-card-body {
            padding: 1rem;
        }

        .flight-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            font-size: 0.875rem;
        }

        .flight-detail-label {
            color: var(--slate-gray);
            font-size: 0.8125rem;
        }

        .flight-detail-value {
            color: var(--pure-white);
            font-weight: 500;
        }

        /* Price Level Badge */
        .price-level-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .price-level-badge.low {
            background: rgba(78, 205, 196, 0.15);
            color: var(--mint-green);
        }

        .price-level-badge.medium {
            background: rgba(102, 102, 255, 0.15);
            color: var(--electric-purple-light);
        }

        .price-level-badge.high {
            background: rgba(255, 107, 107, 0.15);
            color: var(--coral-pink);
        }

        /* Price Chart Container */
        .price-chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .price-chart-title {
            font-size: 0.8125rem;
            color: var(--slate-gray);
            margin-bottom: 0.75rem;
        }

        /* Recommendation Box */
        .recommendation-box {
            background: linear-gradient(135deg, var(--purple-50) 0%, var(--bg-card) 100%);
            border: 1px solid var(--border-color-hover);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .recommendation-title {
            font-size: 0.8125rem;
            color: var(--slate-gray);
            margin-bottom: 0.5rem;
        }

        .recommendation-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .recommendation-icon {
            font-size: 1.75rem;
        }

        .recommendation-text {
            flex: 1;
        }

        .recommendation-text strong {
            display: block;
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
        }

        .recommendation-text span {
            font-size: 0.8125rem;
            color: var(--slate-gray);
        }

        /* Welcome Screen */
        .welcome-screen {
            text-align: center;
            padding: 2rem 1.5rem;
        }

        .welcome-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: welcome-bounce 2s ease-in-out infinite;
        }

        @keyframes welcome-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .welcome-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            color: var(--slate-gray);
            font-size: 0.9375rem;
            margin-bottom: 1.5rem;
        }

        .welcome-features {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            text-align: left;
        }

        .welcome-feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-card);
            border-radius: 12px;
            font-size: 0.875rem;
        }

        .welcome-feature-icon {
            font-size: 1.25rem;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--purple-50);
            border-radius: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--slate-gray);
        }

        .empty-state-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state-text {
            font-size: 0.9375rem;
        }

        /* Price History Chart */
        .price-history-chart {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .price-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .price-history-title {
            font-size: 0.8125rem;
            color: var(--slate-gray);
            font-weight: 500;
        }

        .price-history-current {
            font-family: 'Manrope', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--electric-purple-light);
        }

        .price-history-svg {
            width: 100%;
            height: auto;
        }

        /* Multi-flight List */
        .flight-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .flight-list-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .flight-list-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-color-hover);
        }

        .flight-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .flight-list-route {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .flight-list-route .route-code {
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .flight-list-price {
            font-family: 'Manrope', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--electric-purple-light);
        }

        .flight-list-details {
            display: flex;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--slate-gray);
        }

        .flight-list-detail {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Loading Flights */
        .loading-flights {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            color: var(--slate-gray);
            font-size: 0.875rem;
        }

        .loading-flights-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border-color);
            border-top-color: var(--electric-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {
                max-width: 100%;
            }

            .chat-messages {
                padding: 0.75rem;
            }

            .message {
                max-width: 88%;
            }
        }
    </style>

            { name: '全日空', code: 'NH', emoji: '🇯🇵' },
            { name: '大韩航空', code: 'KE', emoji: '🇰🇷' },
            { name: '新加坡航空', code: 'SQ', emoji: '🇸🇬' },
            { name: '阿联酋航空', code: 'EK', emoji: '🇦🇪' },
            { name: '法国航空', code: 'AF', emoji: '🇫🇷' },
            { name: '英国航空', code: 'BA', emoji: '🇬🇧' },
        ];

        // 目的地数据
        const destinations = [
            { code: 'TYO', name: '东京', country: '日本', emoji: '🗼' },
            { code: 'OSA', name: '大阪', country: '日本', emoji: '🏯' },
            { code: 'SEL', name: '首尔', country: '韩国', emoji: '🏰' },
            { code: 'BKK', name: '曼谷', country: '泰国', emoji: '🛕' },
            { code: 'SIN', name: '新加坡', country: '新加坡', emoji: '🦁' },
            { code: 'PAR', name: '巴黎', country: '法国', emoji: '🗼' },
            { code: 'LON', name: '伦敦', country: '英国', emoji: '🎡' },
            { code: 'NYC', name: '纽约', country: '美国', emoji: '🗽' },
            { code: 'SYD', name: '悉尼', country: '澳大利亚', emoji: '🦘' },
            { code: 'DXB', name: '迪拜', country: '阿联酋', emoji: '🏗️' },
            { code: 'TPE', name: '台北', country: '中国', emoji: '🌃' },
            { code: 'HKG', name: '香港', country: '中国', emoji: '🌆' },
        ];

        // 主应用组件
        function App() {
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [hasStarted, setHasStarted] = useState(false);
            const [searchContext, setSearchContext] = useState(null);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);

            // 滚动到底部
            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // 格式化时间
            const formatTime = (date) => {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            };

            // 提取目的地
            const extractDestination = (text) => {
                for (const dest of destinations) {
                    if (text.includes(dest.name) || text.includes(dest.code)) {
                        return dest;
                    }
                }
                return null;
            };

            // 发送消息
            const sendMessage = async (text) => {
                if (!text.trim()) return;

                const newMessage = {
                    id: Date.now(),
                    type: 'user',
                    content: text,
                    timestamp: new Date(),
                };

                setMessages(prev => [...prev, newMessage]);
                setInputValue('');
                setHasStarted(true);

                // 显示打字状态
                setIsTyping(true);

                try {
                    // 分析用户意图
                    const intent = analyzeIntent(text);
                    const response = await generateResponse(text, intent);

                    setMessages(prev => [...prev, {
                        id: Date.now() + 1,
                        type: 'assistant',
                        content: response.text,
                        timestamp: new Date(),
                        data: response.data,
                    }]);
                } catch (error) {
                    console.error('生成回复失败:', error);
                    setMessages(prev => [...prev, {
                        id: Date.now() + 1,
                        type: 'assistant',
                        content: '抱歉，处理您的请求时遇到了问题。请稍后再试。',
                        timestamp: new Date(),
                    }]);
                } finally {
                    setIsTyping(false);
                }
            };

            // 分析用户意图
            const analyzeIntent = (text) => {
                const lowerText = text.toLowerCase();

                if (lowerText.includes('价格') || lowerText.includes('便宜') || lowerText.includes('贵')) {
                    return 'price_inquiry';
                }
                if (lowerText.includes('买') || lowerText.includes('入手') || lowerText.includes('建议')) {
                    return 'recommendation';
                }
                if (lowerText.includes('走势') || lowerText.includes('趋势') || lowerText.includes('预测')) {
                    return 'price_trend';
                }
                if (lowerText.includes('航班') || lowerText.includes('查询') || lowerText.includes('搜索')) {
                    return 'flight_search';
                }
                return 'general';
            };

            // 生成回复
            const generateResponse = async (text, intent) => {
                const dest = extractDestination(text);

                // 根据意图处理
                switch (intent) {
                    case 'flight_search':
                        return await handleFlightSearch(text, dest);
                    case 'price_inquiry':
                        return await handlePriceInquiry(text, dest);
                    case 'recommendation':
                        return await handleRecommendation(text, dest);
                    case 'price_trend':
                        return await handlePriceTrend(text, dest);
                    default:
                        return handleGeneral(text);
                }
            };

            // 处理航班搜索
            const handleFlightSearch = async (text, dest) => {
                if (!dest) {
                    return {
                        text: '请问您想查询哪个目的地的航班呢？我可以帮您查找东京、大阪、首尔、曼谷、新加坡等地的航班。',
                        data: null,
                    };
                }

                // 使用 flightApi 搜索航班
                const today = new Date().toISOString().split('T')[0];
                const flights = await flightApi.searchFlights({
                    origin: 'PVG',
                    destination: dest.code,
                    departDate: today,
                });

                setSearchContext({ destination: dest, flights });

                return {
                    text: `为您找到 ${flights.length} 个前往${dest.name}的航班，以下是最佳选择：`,
                    data: {
                        type: 'flight_list',
                        flights: flights.slice(0, 4),
                        destination: dest,
                    },
                };
            };

            // 处理价格查询
            const handlePriceInquiry = async (text, dest) => {
                if (!dest) {
                    dest = destinations[0]; // 默认东京
                }

                const history = await flightApi.getPriceHistory('PVG', dest.code);
                const currentPrice = history.data[history.data.length - 1].price;
                const analysis = priceAnalyzer.analyze(currentPrice, history.data.map(d => d.price));

                return {
                    text: `${dest.name}当前价格为 ¥${currentPrice.toLocaleString()}，${analysis.level.description}`,
                    data: {
                        type: 'price_analysis',
                        destination: dest,
                        currentPrice,
                        analysis,
                        history,
                    },
                };
            };

            // 处理购买建议
            const handleRecommendation = async (text, dest) => {
                if (!dest) {
                    return {
                        text: '请问您想了解哪个目的地的购买建议呢？',
                        data: null,
                    };
                }

                const history = await flightApi.getPriceHistory('PVG', dest.code);
                const currentPrice = history.data[history.data.length - 1].price;
                const recommendation = await flightApi.getRecommendation(
                    { origin: 'PVG', destination: dest.code },
                    currentPrice
                );

                return {
                    text: `关于前往${dest.name}的航班，${recommendation.reason}`,
                    data: {
                        type: 'recommendation',
                        recommendation: {
                            ...recommendation,
                            destination: dest,
                            currentPrice,
                        },
                    },
                };
            };

            // 处理价格趋势
            const handlePriceTrend = async (text, dest) => {
                if (!dest) {
                    dest = destinations[0];
                }

                const history = await flightApi.getPriceHistory('PVG', dest.code);
                const currentPrice = history.data[history.data.length - 1].price;
                const analysis = priceAnalyzer.analyze(currentPrice, history.data.map(d => d.price));

                return {
                    text: `${dest.name}价格趋势：${analysis.trend.description}，预计未来价格 ${analysis.trend.predictedChange > 0 ? '上涨' : '下降'} ¥${Math.abs(analysis.trend.predictedChange)}`,
                    data: {
                        type: 'price_trend',
                        destination: dest,
                        history,
                        analysis,
                        currentPrice,
                    },
                };
            };

            // 处理一般询问
            const handleGeneral = (text) => {
                return {
                    text: '您好！我可以帮您：\n• 查询航班价格\n• 分析价格趋势\n• 给出购买建议\n\n请告诉我您想去哪里，比如"查询东京航班"或"去曼谷的价格怎么样"。',
                    data: null,
                };
            };

            // 快捷操作
            const quickActions = [
                '查询东京航班',
                '去曼谷多少钱',
                '现在买还是等等',
                '价格走势图',
            ];

            const handleQuickAction = (action) => {
                sendMessage(action);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(inputValue);
                }
            };

            return (
                <div className="app-container">
                    {/* Header */}
                    <header className="chat-header">
                        <div className="header-title">
                            <span className="header-logo">✈️</span>
                            <div className="header-text">
                                <h1>航班预订助手</h1>
                                <p>AI 驱动的智能出行顾问</p>
                            </div>
                        </div>
                    </header>

                    {/* Chat Messages */}
                    <div className="chat-messages">
                        {!hasStarted && (
                            <div className="welcome-screen">
                                <div className="welcome-emoji">👋</div>
                                <h2 className="welcome-title">欢迎！</h2>
                                <p className="welcome-subtitle">我是您的 AI 航班助手，可以帮您：</p>
                                <div className="welcome-features">
                                    <div className="welcome-feature">
                                        <span className="welcome-feature-icon">🎯</span>
                                        <span>推荐最佳航班</span>
                                    </div>
                                    <div className="welcome-feature">
                                        <span className="welcome-feature-icon">📊</span>
                                        <span>分析价格水位</span>
                                    </div>
                                    <div className="welcome-feature">
                                        <span className="welcome-feature-icon">🔮</span>
                                        <span>预测价格走势</span>
                                    </div>
                                    <div className="welcome-feature">
                                        <span className="welcome-feature-icon">💡</span>
                                        <span>给出购买建议</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        <AnimatePresence>
                            {messages.map((message) => (
                                <motion.div
                                    key={message.id}
                                    className={`message ${message.type}`}
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -20 }}
                                    transition={{ duration: 0.3 }}
                                >
                                    <div className="message-bubble">
                                        {message.content}

                                        {/* 渲染航班列表 */}
                                        {message.data?.type === 'flight_list' && message.data.flights && (
                                            <FlightList flights={message.data.flights} destination={message.data.destination} />
                                        )}

                                        {/* 渲染推荐框 */}
                                        {message.data?.type === 'recommendation' && message.data.recommendation && (
                                            <RecommendationBox recommendation={message.data.recommendation} />
                                        )}

                                        {/* 渲染价格分析 */}
                                        {message.data?.type === 'price_analysis' && message.data.analysis && (
                                            <PriceAnalysis
                                                destination={message.data.destination}
                                                currentPrice={message.data.currentPrice}
                                                analysis={message.data.analysis}
                                                history={message.data.history}
                                            />
                                        )}

                                        {/* 渲染价格趋势 */}
                                        {message.data?.type === 'price_trend' && message.data.history && (
                                            <PriceTrendChart
                                                destination={message.data.destination}
                                                history={message.data.history}
                                                currentPrice={message.data.currentPrice}
                                                analysis={message.data.analysis}
                                            />
                                        )}
                                    </div>
                                    <div className="message-time">{formatTime(message.timestamp)}</div>
                                </motion.div>
                            ))}
                        </AnimatePresence>

                        {/* 打字指示器 */}
                        {isTyping && (
                            <div className="message assistant">
                                <div className="typing-indicator">
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                </div>
                            </div>
                        )}

                        <div ref={messagesEndRef} />
                    </div>

                    {/* Quick Actions */}
                    {!hasStarted && (
                        <div className="quick-actions">
                            {quickActions.map((action, index) => (
                                <button
                                    key={index}
                                    className="quick-action-chip"
                                    onClick={() => handleQuickAction(action)}
                                >
                                    {action}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* Input Area */}
                    <div className="chat-input-area">
                        <div className="input-wrapper">
                            <input
                                ref={inputRef}
                                type="text"
                                className="chat-input"
                                placeholder="告诉我您想去哪里..."
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyPress={handleKeyPress}
                            />
                            <button
                                className="send-button"
                                onClick={() => sendMessage(inputValue)}
                                disabled={!inputValue.trim() || isTyping}
                            >
                                ➤
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 航班卡片组件
        function FlightCard({ flight }) {
            return (
                <div className="flight-card-rich">
                    <div className="flight-card-header">
                        <div className="flight-route">
                            <span className="route-code">{flight.origin}</span>
                            <span className="route-arrow">→</span>
                            <span className="route-code">{flight.destination}</span>
                        </div>
                        <span className="flight-price">¥{flight.price.toLocaleString()}</span>
                    </div>
                    <div className="flight-card-body">
                        <div className="flight-detail-row">
                            <span className="flight-detail-label">航空公司</span>
                            <span className="flight-detail-value">{flight.airline}</span>
                        </div>
                        <div className="flight-detail-row">
                            <span className="flight-detail-label">起飞时间</span>
                            <span className="flight-detail-value">{flight.departTime}</span>
                        </div>
                        <div className="flight-detail-row">
                            <span className="flight-detail-label">到达时间</span>
                            <span className="flight-detail-value">{flight.arrivalTime}</span>
                        </div>
                        <div className="flight-detail-row">
                            <span className="flight-detail-label">行程时长</span>
                            <span className="flight-detail-value">{flight.duration}</span>
                        </div>
                        <div className="flight-detail-row">
                            <span className="flight-detail-label">中转</span>
                            <span className="flight-detail-value" style={{ color: flight.stops === 0 ? 'var(--mint-green)' : 'var(--pure-white)' }}>
                                {flight.stops === 0 ? '直飞' : `${flight.stops}次中转`}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        // 推荐框组件
        function RecommendationBox({ recommendation }) {
            const isBuy = recommendation.action === 'buy';

            return (
                <div className="recommendation-box">
                    <div className="recommendation-title">购买建议</div>
                    <div className="recommendation-content">
                        <span className="recommendation-icon">{isBuy ? '✅' : '⏳'}</span>
                        <div className="recommendation-text">
                            <strong style={{ color: isBuy ? 'var(--mint-green)' : 'var(--sunset-orange)' }}>
                                {isBuy ? '建议现在购买' : '建议继续观望'}
                            </strong>
                            <span>{recommendation.reason}</span>
                            {recommendation.waitUntil && (
                                <span style={{ display: 'block', marginTop: '0.5rem', color: 'var(--electric-purple-light)' }}>
                                    预计等待：{recommendation.waitUntil}
                                </span>
                            )}
                            {recommendation.expectedDrop > 0 && (
                                <span style={{ display: 'block', marginTop: '0.25rem', color: 'var(--mint-green)' }}>
                                    预计可省：¥{recommendation.expectedDrop.toLocaleString()}
                                </span>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // 航班列表组件
        function FlightList({ flights, destination }) {
            const getLevelColor = (price) => {
                const basePrice = 2500;
                if (price < basePrice * 0.85) return 'var(--mint-green)';
                if (price > basePrice * 1.15) return 'var(--coral-pink)';
                return 'var(--electric-purple-light)';
            };

            return (
                <div className="flight-list">
                    {flights.map((flight, index) => (
                        <div key={flight.id || index} className="flight-list-item">
                            <div className="flight-list-header">
                                <div className="flight-list-route">
                                    <span className="route-code">{flight.origin}</span>
                                    <span className="route-arrow">→</span>
                                    <span className="route-code">{flight.destination}</span>
                                </div>
                                <span className="flight-list-price" style={{ color: getLevelColor(flight.price) }}>
                                    ¥{flight.price.toLocaleString()}
                                </span>
                            </div>
                            <div className="flight-list-details">
                                <span className="flight-list-detail">✈️ {flight.airline}</span>
                                <span className="flight-list-detail">🕐 {flight.departTime}</span>
                                <span className="flight-list-detail">
                                    {flight.stops === 0 ? '✅ 直飞' : `🔄 ${flight.stops}次中转`}
                                </span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 价格分析组件
        function PriceAnalysis({ destination, currentPrice, analysis, history }) {
            const levelColors = {
                low: 'var(--mint-green)',
                medium: 'var(--electric-purple-light)',
                high: 'var(--coral-pink)',
            };

            const levelTexts = {
                low: '历史低价',
                medium: '价格适中',
                high: '价格较高',
            };

            return (
                <div className="price-history-chart">
                    <div className="price-history-header">
                        <span className="price-history-title">{destination.name} · 价格分析</span>
                        <span className="price-history-current">¥{currentPrice.toLocaleString()}</span>
                    </div>

                    {/* 价格水位徽章 */}
                    <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem' }}>
                        <span
                            className="price-level-badge"
                            style={{
                                background: levelColors[analysis.level.level] + '25',
                                color: levelColors[analysis.level.level],
                            }}
                        >
                            {levelTexts[analysis.level.level]}
                        </span>
                        <span className="price-level-badge" style={{ background: 'var(--purple-50)', color: 'var(--pure-white)' }}>
                            均价 ¥{analysis.average.toLocaleString()}
                        </span>
                    </div>

                    {/* 价格图表 */}
                    <div
                        className="price-history-svg"
                        dangerouslySetInnerHTML={{
                            __html: chartGenerator.generateSvg(history.data, {
                                width: 300,
                                height: 100,
                                lineColor: levelColors[analysis.level.level],
                            }),
                        }}
                    />

                    {/* 趋势信息 */}
                    <div style={{ marginTop: '0.75rem', fontSize: '0.75rem', color: 'var(--slate-gray)' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.25rem' }}>
                            <span>最低：¥{analysis.min.toLocaleString()}</span>
                            <span>最高：¥{analysis.max.toLocaleString()}</span>
                        </div>
                        <div style={{ color: levelColors[analysis.trend.direction === 'rising' ? 'high' : analysis.trend.direction === 'falling' ? 'low' : 'medium'] }}>
                            趋势：{analysis.trend.description}
                        </div>
                    </div>
                </div>
            );
        }

        // 价格趋势图表组件
        function PriceTrendChart({ destination, history, currentPrice, analysis }) {
            const svg = chartGenerator.generateSvg(history.data, {
                width: 320,
                height: 140,
                lineColor: 'var(--electric-purple)',
            });

            return (
                <div className="price-history-chart">
                    <div className="price-history-header">
                        <span className="price-history-title">{destination.name} · 30 天价格走势</span>
                        <span className="price-history-current">¥{currentPrice.toLocaleString()}</span>
                    </div>

                    <div
                        className="price-history-svg"
                        dangerouslySetInnerHTML={{ __html: svg }}
                    />

                    <div style={{ marginTop: '0.75rem', fontSize: '0.75rem', color: 'var(--slate-gray)' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                            <span>30 天前：¥{history.data[0]?.price.toLocaleString()}</span>
                            <span>
                                趋势：{analysis.trend.direction === 'rising' ? '📈 上涨' : analysis.trend.direction === 'falling' ? '📉 下降' : '➡️ 平稳'}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>


</body></html>
