<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Search - 智能航班推荐</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Google Fonts: Manrope for flight times -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 主题色 - Electric Purple (与 flight-tinder 一致) */
            --electric-purple: #6666FF;
            --electric-purple-light: #8888FF;
            --electric-purple-dark: #5555EE;
            --electric-purple-rgb: 102, 102, 255;

            /* 紫色系 */
            --purple-50: rgba(102, 102, 255, 0.08);
            --purple-100: rgba(102, 102, 255, 0.15);
            --purple-200: rgba(102, 102, 255, 0.25);
            --purple-300: rgba(102, 102, 255, 0.4);
            --purple-400: rgba(102, 102, 255, 0.6);
            --purple-500: rgba(102, 102, 255, 0.8);

            /* 强调色 */
            --coral-pink: #FF6B6B;
            --mint-green: #4ECDC4;
            --sunset-orange: #FF8E53;

            /* 中性色 */
            --ink-black: #0a0a0f;
            --slate-gray: #6B7280;
            --mist-gray: #F3F4F6;
            --pure-white: #FFFFFF;

            /* 背景 */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-hover: rgba(102, 102, 255, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0d0d14 100%);
            color: var(--pure-white);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 微纹理 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 1000;
        }

        /* Background Orbs - Electric Purple 主题 */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
        }

        .bg-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(102, 102, 255, 0.4) 0%, transparent 70%);
            top: -300px;
            right: -200px;
            animation: float 10s ease-in-out infinite;
        }

        .bg-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.3) 0%, transparent 70%);
            bottom: -250px;
            left: -200px;
            animation: float 12s ease-in-out infinite reverse;
        }

        .bg-orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.25) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -40px) scale(1.05); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        /* Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 3rem 0 2rem;
        }

        .header-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: plane-float 3s ease-in-out infinite;
        }

        @keyframes plane-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--electric-purple-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--slate-gray);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Search Form Card */
        .search-form {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            margin-bottom: 2.5rem;
            transition: all 0.3s ease;
        }

        .search-form:hover {
            border-color: var(--border-color-hover);
            background: var(--bg-card-hover);
        }

        .form-title {
            font-size: 0.875rem;
            color: var(--slate-gray);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-title::before {
            content: '';
            width: 20px;
            height: 2px;
            background: linear-gradient(90deg, var(--electric-purple), transparent);
            border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.8rem;
            color: var(--slate-gray);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: var(--pure-white);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--electric-purple);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(102, 102, 255, 0.1);
        }

        .form-group select option {
            background: var(--bg-primary);
            color: var(--pure-white);
        }

        .search-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--electric-purple-dark) 100%);
            border: none;
            border-radius: 14px;
            padding: 1rem 2rem;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 102, 255, 0.35);
        }

        .search-btn:hover::before {
            opacity: 1;
        }

        .search-btn:active {
            transform: translateY(0);
        }

        /* Loading State */
        .loading {
            display: none;
            text-align: center;
            padding: 4rem 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 3px solid var(--border-color);
            border-top-color: var(--electric-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--slate-gray);
            font-size: 1rem;
        }

        /* Results Section */
        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
            animation: fade-in 0.5s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .results-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .results-count {
            color: var(--slate-gray);
            font-size: 0.875rem;
            background: var(--purple-50);
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        /* Flight Cards Grid */
        .flights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        /* Flight Card */
        .flight-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .flight-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, var(--electric-purple), transparent, var(--mint-green));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .flight-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-color-hover);
            box-shadow: 0 20px 50px rgba(102, 102, 255, 0.15);
        }

        .flight-card:hover::before {
            opacity: 1;
        }

        .card-image {
            height: 140px;
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--electric-purple-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            position: relative;
            overflow: hidden;
        }

        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(10, 10, 15, 0.9) 100%);
        }

        .card-image.mint {
            background: linear-gradient(135deg, var(--mint-green) 0%, #45b7d1 100%);
        }

        .card-image.coral {
            background: linear-gradient(135deg, var(--coral-pink) 0%, var(--sunset-orange) 100%);
        }

        .card-image.sunset {
            background: linear-gradient(135deg, var(--sunset-orange) 0%, #FF6B6B 100%);
        }

        .card-content {
            padding: 1.25rem;
        }

        .card-route {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .route-city {
            text-align: center;
            flex: 1;
        }

        .route-city .code {
            font-family: 'Manrope', sans-serif;
            font-size: 1.375rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .route-city .name {
            font-size: 0.7rem;
            color: var(--slate-gray);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .route-flight {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--slate-gray);
            font-size: 0.75rem;
            padding: 0 0.75rem;
        }

        .route-flight-icon {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
            transform: rotate(45deg);
        }

        .route-flight .duration {
            color: var(--slate-gray);
            font-size: 0.7rem;
            margin-top: 0.25rem;
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            margin-bottom: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--slate-gray);
        }

        .detail-value {
            font-size: 0.8rem;
            color: var(--pure-white);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .price-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .price-badge.low {
            background: rgba(78, 205, 196, 0.15);
            color: var(--mint-green);
        }

        .price-badge.good {
            background: rgba(102, 102, 255, 0.15);
            color: var(--electric-purple-light);
        }

        .price-badge.high {
            background: rgba(255, 107, 107, 0.15);
            color: var(--coral-pink);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .price {
            font-family: 'Manrope', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--mint-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .book-btn {
            background: linear-gradient(135deg, var(--electric-purple) 0%, var(--electric-purple-dark) 100%);
            border: none;
            border-radius: 10px;
            padding: 0.625rem 1.25rem;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .book-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 102, 255, 0.35);
        }

        /* Empty State */
        .empty-state {
            display: none;
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state.active {
            display: block;
        }

        .empty-state .emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--slate-gray);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .search-form {
                padding: 1.25rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .flights-grid {
                grid-template-columns: 1fr;
            }

            .results-header {
                flex-direction: column;
                gap: 0.75rem;
                text-align: left;
            }
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // 城市数据（带机场代码）
        const cities = [
            { code: 'SHA', name: '上海', country: '中国', emoji: '🏙️' },
            { code: 'PEK', name: '北京', country: '中国', emoji: '🏛️' },
            { code: 'PVG', name: '上海浦东', country: '中国', emoji: '✈️' },

            { code: 'HKG', name: '香港', country: '中国', emoji: '🌆' },
        ];

        // 目的地数据
        const destinations = [
            { code: 'TYO', name: '东京', country: '日本', emoji: '🗼' },
            { code: 'OSA', name: '大阪', country: '日本', emoji: '🏯' },
            { code: 'SEL', name: '首尔', country: '韩国', emoji: '🏰' },
            { code: 'BKK', name: '曼谷', country: '泰国', emoji: '🛕' },
            { code: 'SIN', name: '新加坡', country: '新加坡', emoji: '🦁' },
            { code: 'PAR', name: '巴黎', country: '法国', emoji: '🗼' },

            { code: 'SYD', name: '悉尼', country: '澳大利亚', emoji: '🦘' },
            { code: 'DXB', name: '迪拜', country: '阿联酋', emoji: '🏗️' },
            { code: 'KUL', name: '吉隆坡', country: '马来西亚', emoji: '🕌' },
            { code: 'TPE', name: '台北', country: '中国', emoji: '🌃' },
            { code: 'HKG', name: '香港', country: '中国', emoji: '🌆' },
            { code: 'PHU', name: '普吉岛', country: '泰国', emoji: '🏝️' },
            { code: 'BAL', name: '巴厘岛', country: '印度尼西亚', emoji: '🌺' },
            { code: 'KEF', name: '雷克雅未克', country: '冰岛', emoji: '🌋' },
            { code: 'ROM', name: '罗马', country: '意大利', emoji: '🏛️' },
            { code: 'BCN', name: '巴塞罗那', country: '西班牙', emoji: '🎨' },
        ];

        // 航空公司数据
        const airlines = [
            { name: '中国东方航空', code: 'MU', emoji: '🇨🇳' },
            { name: '中国国际航空', code: 'CA', emoji: '🇨🇳' },
            { name: '南方航空', code: 'CZ', emoji: '🇨🇳' },
            { name: '日本航空', code: 'JL', emoji: '🇯🇵' },
            { name: '全日空', code: 'NH', emoji: '🇯🇵' },
            { name: '大韩航空', code: 'KE', emoji: '🇰🇷' },
            { name: '新加坡航空', code: 'SQ', emoji: '🇸🇬' },
            { name: '阿联酋航空', code: 'EK', emoji: '🇦🇪' },
            { name: '法国航空', code: 'AF', emoji: '🇫🇷' },
            { name: '英国航空', code: 'BA', emoji: '🇬🇧' },
        ];

        // 生成模拟航班数据
        function generateMockFlights(searchParams) {
            const { origin, destination, departDate, budget } = searchParams;
            const results = [];

            // 如果目的地是"任意"，随机选择 6-10 个目的地
            let selectedDestinations = destination === 'any'
                ? destinations.sort(() => Math.random() - 0.5).slice(0, Math.floor(Math.random() * 5) + 6)
                : destinations.filter(d => d.code === destination);

            selectedDestinations.forEach((dest, index) => {
                const flightCount = Math.floor(Math.random() * 3) + 1;

                for (let i = 0; i < flightCount; i++) {
                    const airline = airlines[Math.floor(Math.random() * airlines.length)];
                    const basePrice = Math.floor(Math.random() * 4000) + 600;
                    const price = budget === 'any' ? basePrice : Math.min(basePrice, parseInt(budget));

                    // 价格状态
                    let priceStatus = 'good';
                    if (price < 1500) priceStatus = 'low';
                    if (price > 3500) priceStatus = 'high';

                    // 生成随机时间
                    const departHour = Math.floor(Math.random() * 24);
                    const departMinute = Math.floor(Math.random() * 4) * 15;
                    const duration = Math.floor(Math.random() * 12) + 2;
                    const arrivalHour = (departHour + duration) % 24;

                    results.push({
                        id: `${dest.code}-${index}-${i}`,
                        airline: airline,
                        origin: cities.find(c => c.code === origin) || { code: origin, name: '出发地', emoji: '✈️' },
                        destination: dest,
                        departTime: `${String(departHour).padStart(2, '0')}:${String(departMinute).padStart(2, '0')}`,
                        arrivalTime: `${String(arrivalHour).padStart(2, '0')}:${String(departMinute).padStart(2, '0')}`,
                        duration: `${duration}小时${Math.floor(Math.random() * 60)}分`,
                        price: price,
                        stops: Math.random() > 0.6 ? 1 : 0,
                        stopsCity: Math.random() > 0.6 ? ['台北', '香港', '首尔', '曼谷'][Math.floor(Math.random() * 4)] : null,
                        date: departDate,
                        priceStatus: priceStatus,
                        gradientClass: index % 4 === 0 ? '' : index % 4 === 1 ? 'mint' : index % 4 === 2 ? 'coral' : 'sunset',
                    });
                }
            });

            return results.sort((a, b) => a.price - b.price);
        }

        // 主应用组件
        function App() {
            const [formData, setFormData] = useState({
                origin: 'SHA',
                destination: 'any',
                departDate: new Date().toISOString().split('T')[0],
                budget: 'any',
            });
            const [flights, setFlights] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [hasSearched, setHasSearched] = useState(false);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const handleSearch = () => {
                setIsLoading(true);
                setHasSearched(true);

                setTimeout(() => {
                    const results = generateMockFlights(formData);
                    setFlights(results);
                    setIsLoading(false);
                }, 1200);
            };

            const handleBook = (flight) => {
                alert(`即将预订：${flight.airline.name}\n${flight.origin.code} → ${flight.destination.code}\n价格：¥${flight.price}`);
            };

            const getPriceStatusText = (status) => {
                const texts = {
                    low: '¥ 历史低价',
                    good: '¥ 价格合适',
                    high: '¥ 价格较高'
                };
                return texts[status] || '';
            };

            return (
                <div className="container">
                    {/* Header */}
                    <header className="header">
                        <motion.div
                            className="header-logo"
                            initial={{ opacity: 0, y: -20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.6 }}
                        >
                            ✈️
                        </motion.div>
                        <motion.h1
                            initial={{ opacity: 0, y: -20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.6, delay: 0.1 }}
                        >
                            <span>Flight Search</span>
                        </motion.h1>
                        <motion.p
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: 0.6, delay: 0.2 }}
                        >
                            智能航班推荐 · 发现你的下一个目的地
                        </motion.p>
                    </header>

                    {/* Search Form */}
                    <motion.section
                        className="search-form"
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 0.6, delay: 0.3 }}
                    >
                        <div className="form-title">搜索条件</div>
                        <div className="form-grid">
                            {/* 出发城市 */}
                            <div className="form-group">
                                <label>出发城市</label>
                                <select name="origin" value={formData.origin} onChange={handleInputChange}>
                                    {cities.map(city => (
                                        <option key={city.code} value={city.code}>
                                            {city.emoji} {city.name} ({city.code})
                                        </option>
                                    ))}
                                </select>
                            </div>

                            {/* 目的地 */}
                            <div className="form-group">
                                <label>目的地</label>
                                <select name="destination" value={formData.destination} onChange={handleInputChange}>
                                    <option value="any">🌍 任意目的地</option>
                                    {destinations.map(dest => (
                                        <option key={dest.code} value={dest.code}>
                                            {dest.emoji} {dest.name} ({dest.code})
                                        </option>
                                    ))}
                                </select>
                            </div>

                            {/* 出发日期 */}
                            <div className="form-group">
                                <label>出发日期</label>
                                <input
                                    type="date"
                                    name="departDate"
                                    value={formData.departDate}
                                    min={new Date().toISOString().split('T')[0]}
                                    onChange={handleInputChange}
                                />
                            </div>

                            {/* 预算范围 */}
                            <div className="form-group">
                                <label>预算范围</label>
                                <select name="budget" value={formData.budget} onChange={handleInputChange}>
                                    <option value="any">💰 任意价格</option>
                                    <option value="2000">¥2,000 以内</option>
                                    <option value="4000">¥4,000 以内</option>
                                    <option value="8000">¥8,000 以内</option>
                                    <option value="15000">¥15,000 以内</option>
                                </select>
                            </div>

                            {/* 搜索按钮 */}
                            <button className="search-btn" onClick={handleSearch}>
                                <span>🔍</span>
                                搜索航班
                            </button>
                        </div>
                    </motion.section>

                    {/* Loading State */}
                    <div className={`loading ${isLoading ? 'active' : ''}`}>
                        <div className="spinner"></div>
                        <p>正在搜索最佳航班...</p>
                    </div>

                    {/* Results Section */}
                    <section className={`results-section ${hasSearched && !isLoading ? 'active' : ''}`}>
                        <div className="results-header">
                            <h2>搜索结果</h2>
                            <span className="results-count">{flights.length} 个航班</span>
                        </div>

                        {flights.length === 0 ? (
                            <div className="empty-state active">
                                <div className="emoji">😢</div>
                                <h3>未找到符合条件的航班</h3>
                                <p>尝试调整预算或日期范围</p>
                            </div>
                        ) : (
                            <div className="flights-grid">
                                {flights.map((flight, index) => (
                                    <motion.div
                                        key={flight.id}
                                        className="flight-card"
                                        initial={{ opacity: 0, y: 30 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ duration: 0.4, delay: index * 0.08 }}
                                        onClick={() => handleBook(flight)}
                                    >
                                        <div className={`card-image ${flight.gradientClass}`}>
                                            <span>{flight.destination.emoji}</span>
                                        </div>
                                        <div className="card-content">
                                            <div className="card-route">
                                                <div className="route-city">
                                                    <div className="code">{flight.origin.code}</div>
                                                    <div className="name">{flight.origin.name}</div>
                                                </div>
                                                <div className="route-flight">
                                                    <span className="route-flight-icon">✈️</span>
                                                    <span className="duration">{flight.duration}</span>
                                                </div>
                                                <div className="route-city">
                                                    <div className="code">{flight.destination.code}</div>
                                                    <div className="name">{flight.destination.name}</div>
                                                </div>
                                            </div>

                                            <div className="card-details">
                                                <div className="detail-row">
                                                    <span className="detail-label">航空公司</span>
                                                    <span className="detail-value">{flight.airline.emoji} {flight.airline.name}</span>
                                                </div>
                                                <div className="detail-row">
                                                    <span className="detail-label">起飞时间</span>
                                                    <span className="detail-value flight-time">{flight.departTime}</span>
                                                </div>
                                                <div className="detail-row">
                                                    <span className="detail-label">中转</span>
                                                    <span className="detail-value">
                                                        {flight.stops === 0 ? (
                                                            <span style={{ color: 'var(--mint-green)' }}>直飞</span>
                                                        ) : (
                                                            `${flight.stops}次 · ${flight.stopsCity}`
                                                        )}
                                                    </span>
                                                </div>
                                                <div className="detail-row">
                                                    <span className="detail-label">价格</span>
                                                    <span className={`price-badge ${flight.priceStatus}`}>
                                                        {getPriceStatusText(flight.priceStatus)}
                                                    </span>
                                                </div>
                                            </div>

                                            <div className="card-footer">
                                                <span className="price">¥{flight.price.toLocaleString()}</span>
                                                <button className="book-btn">预订</button>
                                            </div>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                        )}
                    </section>
                </div>
            );
        }

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
