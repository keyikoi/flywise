<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float to Mkt Transition - Remotion 动画预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .container {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: linear-gradient(180deg, #f5f7fa 0%, #ffffff 100%);
      overflow: hidden;
      transform: scale(0.5);
      transform-origin: center top;
    }

    /* 背景航班列表模拟 */
    .flight-list {
      position: absolute;
      top: 80px;
      left: 168px;
      right: 168px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .flight-card {
      height: 120px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* 动态条 */
    .bar {
      position: absolute;
      width: 714px;
      background: #ffffff;
      box-shadow: 0px 12px 40px rgba(0, 0, 0, 0.16);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 18px;
      overflow: hidden;
      will-change: top, left, height, border-radius;
    }

    /* 图标容器 */
    .icon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      will-change: width, height;
    }

    /* 红包图标 */
    .red-packet {
      position: absolute;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      border-radius: 15%;
      overflow: hidden;
      will-change: opacity;
    }

    .red-packet::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      height: 40%;
      background: radial-gradient(circle, #ffd700 0%, #ffb700 70%);
      border-radius: 50%;
    }

    .red-packet::after {
      content: '福';
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd700;
      font-weight: bold;
    }

    /* 小图标 */
    .small-icon {
      position: absolute;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      border-radius: 20%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      will-change: opacity;
    }

    /* 文字区域 */
    .text-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: hidden;
      will-change: opacity;
    }

    .float-text {
      will-change: opacity;
    }

    .float-text .title {
      font-size: 32px;
      font-weight: 500;
      color: #0f131a;
      line-height: 1.4;
      white-space: nowrap;
    }

    .float-text .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: #5c5f66;
      line-height: 1.4;
      white-space: nowrap;
    }

    .mkt-text {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 12px;
      will-change: opacity;
    }

    .mkt-text .title {
      font-size: 28px;
      font-weight: 500;
      color: #149aa8;
      white-space: nowrap;
    }

    .mkt-text .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: #0f131a;
      white-space: nowrap;
    }

    /* 黄色按钮 */
    .yellow-btn {
      height: 60px;
      padding: 0 24px;
      background: #ffe033;
      border-radius: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: opacity;
    }

    .yellow-btn span {
      font-size: 28px;
      font-weight: 500;
      color: #0f131a;
      white-space: nowrap;
    }

    /* 箭头图标 */
    .arrow-icon {
      width: 24px;
      height: 24px;
      will-change: opacity;
    }

    .arrow-icon svg {
      width: 100%;
      height: 100%;
    }

    /* 关闭按钮 */
    .close-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: opacity;
    }

    .close-btn svg {
      width: 28px;
      height: 28px;
    }

    /* 控制面板 */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 100;
    }

    .controls button {
      padding: 12px 24px;
      font-size: 16px;
      font-family: inherit;
      background: #6666ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .controls button:hover {
      background: #5555ee;
    }

    .controls button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* 状态显示 */
    .status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 15px 20px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 14px;
      color: #333;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      z-index: 100;
    }

    .status div {
      margin: 5px 0;
    }

    /* 缩放容器使适合屏幕 */
    .scale-wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="scale-wrapper">
    <div class="container" id="container">
      <!-- 背景航班列表 -->
      <div class="flight-list">
        <div class="flight-card"></div>
        <div class="flight-card"></div>
        <div class="flight-card"></div>
      </div>

      <!-- 动态条 -->
      <div class="bar" id="bar">
        <!-- 图标 -->
        <div class="icon-wrapper" id="iconWrapper">
          <div class="red-packet" id="redPacket"></div>
          <div class="small-icon" id="smallIcon">💰</div>
        </div>

        <!-- 文字区域 -->
        <div class="text-area">
          <div class="float-text" id="floatText">
            <div class="title">航班历史低价</div>
            <div class="subtitle">当前为价格低点 建议尽快预订</div>
          </div>
          <div class="mkt-text" id="mktText">
            <div class="title">历史低价</div>
            <div class="subtitle">当前价格是该航班近期低价，建议尽快预订</div>
          </div>
        </div>

        <!-- 黄色按钮 -->
        <div class="yellow-btn" id="yellowBtn">
          <span>看趋势</span>
        </div>

        <!-- 箭头图标 -->
        <div class="arrow-icon" id="arrowIcon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="#0f131a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- 关闭按钮 -->
        <div class="close-btn" id="closeBtn">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="#5c5f66" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- 状态显示 -->
  <div class="status">
    <div>状态：<span id="statusText">保持中</span></div>
    <div>时间：<span id="timer">0.00</span>s</div>
    <div>位置：<span id="position">top: 110px</span></div>
    <div>高度：<span id="height">130px</span></div>
  </div>

  <!-- 控制面板 -->
  <div class="controls">
    <button id="startBtn" onclick="startAnimation()">开始动画</button>
    <button id="resetBtn" onclick="resetAnimation()">重置</button>
    <button id="loopBtn" onclick="toggleLoop()">循环：关</button>
  </div>

  <script>
    // 动画配置（与 Remotion 代码一致）
    const HOLD_DURATION = 3000; // 3 秒
    const TRANSITION_DURATION = 800; // 0.8 秒

    // 初始值
    const floatBar = {
      top: 110,
      left: (1920 - 714) / 2, // 居中
      height: 130,
      borderRadius: 24,
      iconSize: 82,
    };

    const mktBar = {
      top: 632,
      left: 18,
      height: 72,
      borderRadius: 12,
      iconSize: 40,
    };

    let startTime = null;
    let animationFrame = null;
    let isLooping = false;
    let hasTransitioned = false;

    const bar = document.getElementById('bar');
    const iconWrapper = document.getElementById('iconWrapper');
    const redPacket = document.getElementById('redPacket');
    const smallIcon = document.getElementById('smallIcon');
    const floatText = document.getElementById('floatText');
    const mktText = document.getElementById('mktText');
    const yellowBtn = document.getElementById('yellowBtn');
    const arrowIcon = document.getElementById('arrowIcon');
    const closeBtn = document.getElementById('closeBtn');

    const statusText = document.getElementById('statusText');
    const timerDisplay = document.getElementById('timer');
    const positionDisplay = document.getElementById('position');
    const heightDisplay = document.getElementById('height');
    const startBtn = document.getElementById('startBtn');
    const loopBtn = document.getElementById('loopBtn');

    // 缓动函数：cubic in-out
    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // 插值函数
    function lerp(start, end, t) {
      return start + (end - start) * t;
    }

    // 更新动画
    function updateAnimation(elapsed) {
      let progress = 0;

      if (elapsed < HOLD_DURATION) {
        // 保持阶段
        progress = 0;
        statusText.textContent = '保持中';
      } else if (elapsed < HOLD_DURATION + TRANSITION_DURATION) {
        // 过渡阶段
        progress = easeInOutCubic((elapsed - HOLD_DURATION) / TRANSITION_DURATION);
        statusText.textContent = '过渡中...';
        hasTransitioned = true;
      } else {
        // 完成阶段
        progress = 1;
        statusText.textContent = '已完成';
        hasTransitioned = true;
      }

      // 更新位置
      const currentTop = lerp(floatBar.top, mktBar.top, progress);
      const currentLeft = lerp(floatBar.left, mktBar.left, progress);
      const currentHeight = lerp(floatBar.height, mktBar.height, progress);
      const currentBorderRadius = lerp(floatBar.borderRadius, mktBar.borderRadius, progress);
      const currentIconSize = lerp(floatBar.iconSize, mktBar.iconSize, progress);

      // 应用样式
      bar.style.top = currentTop + 'px';
      bar.style.left = currentLeft + 'px';
      bar.style.height = currentHeight + 'px';
      bar.style.borderRadius = currentBorderRadius + 'px';

      iconWrapper.style.width = currentIconSize + 'px';
      iconWrapper.style.height = currentIconSize + 'px';
      redPacket.style.width = currentIconSize + 'px';
      redPacket.style.height = currentIconSize + 'px';
      redPacket.style.borderRadius = currentIconSize * 0.15 + 'px';
      redPacket.style.fontSize = currentIconSize * 0.25 + 'px';

      smallIcon.style.width = currentIconSize + 'px';
      smallIcon.style.height = currentIconSize + 'px';
      smallIcon.style.borderRadius = currentIconSize * 0.2 + 'px';
      smallIcon.style.fontSize = currentIconSize * 0.5 + 'px';

      // 内容交叉淡入淡出
      if (elapsed < HOLD_DURATION) {
        // 保持阶段：显示 float 内容
        floatText.style.opacity = 1;
        mktText.style.opacity = 0;
        yellowBtn.style.opacity = 1;
        arrowIcon.style.opacity = 0;
        closeBtn.style.opacity = 1;
      } else {
        const transitionProgress = (elapsed - HOLD_DURATION) / TRANSITION_DURATION;

        // Float 内容淡出（0-0.4）
        const floatOpacity = Math.max(0, 1 - transitionProgress / 0.4);
        floatText.style.opacity = floatOpacity;

        // 按钮和关闭按钮淡出（0-0.3）
        const btnOpacity = Math.max(0, 1 - transitionProgress / 0.3);
        yellowBtn.style.opacity = btnOpacity;
        closeBtn.style.opacity = btnOpacity;

        // Mkt 内容淡入（0.2-0.6）
        const mktOpacity = Math.min(1, Math.max(0, (transitionProgress - 0.2) / 0.4));
        mktText.style.opacity = mktOpacity;

        // 箭头淡入（0.7-1）
        const arrowOpacity = Math.min(1, Math.max(0, (transitionProgress - 0.7) / 0.3));
        arrowIcon.style.opacity = arrowOpacity;
      }

      // 更新状态显示
      timerDisplay.textContent = (elapsed / 1000).toFixed(2);
      positionDisplay.textContent = `top: ${currentTop.toFixed(0)}px, left: ${currentLeft.toFixed(0)}px`;
      heightDisplay.textContent = `${currentHeight.toFixed(0)}px`;
    }

    // 动画循环
    function animate() {
      if (!startTime) startTime = Date.now();
      const elapsed = Date.now() - startTime;

      updateAnimation(elapsed);

      if (elapsed < HOLD_DURATION + TRANSITION_DURATION) {
        animationFrame = requestAnimationFrame(animate);
      } else if (isLooping) {
        setTimeout(() => {
          resetAnimation();
          setTimeout(animate, 500);
        }, 1000);
      }
    }

    // 开始动画
    function startAnimation() {
      if (hasTransitioned) return;
      startBtn.disabled = true;
      animate();
    }

    // 重置动画
    function resetAnimation() {
      if (animationFrame) cancelAnimationFrame(animationFrame);

      startTime = null;
      hasTransitioned = false;
      startBtn.disabled = false;

      // 重置样式
      bar.style.top = floatBar.top + 'px';
      bar.style.left = floatBar.left + 'px';
      bar.style.height = floatBar.height + 'px';
      bar.style.borderRadius = floatBar.borderRadius + 'px';

      iconWrapper.style.width = floatBar.iconSize + 'px';
      iconWrapper.style.height = floatBar.iconSize + 'px';
      redPacket.style.width = floatBar.iconSize + 'px';
      redPacket.style.height = floatBar.iconSize + 'px';
      redPacket.style.borderRadius = floatBar.iconSize * 0.15 + 'px';

      smallIcon.style.width = floatBar.iconSize + 'px';
      smallIcon.style.height = floatBar.iconSize + 'px';
      smallIcon.style.borderRadius = floatBar.iconSize * 0.2 + 'px';

      floatText.style.opacity = 1;
      mktText.style.opacity = 0;
      yellowBtn.style.opacity = 1;
      arrowIcon.style.opacity = 0;
      closeBtn.style.opacity = 1;

      statusText.textContent = '保持中';
      timerDisplay.textContent = '0.00';
      positionDisplay.textContent = `top: ${floatBar.top}px`;
      heightDisplay.textContent = `${floatBar.height}px`;
    }

    // 切换循环
    function toggleLoop() {
      isLooping = !isLooping;
      loopBtn.textContent = '循环：' + (isLooping ? '开' : '关');
    }

    // 初始化
    resetAnimation();

    // 自动开始
    setTimeout(startAnimation, 500);
  </script>
</body>
</html>
